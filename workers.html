<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workers' Portal – RCCG Chapel of Grace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
</head>
<body>

  <div class="hero">
    <div class="d-flex align-items-center gap-3">
      <a href="index.html" class="hero-back" aria-label="Back to portals">
        <i class="bi bi-arrow-left fs-5"></i>
      </a>
      <div>
        <div class="hero-eyebrow">RCCG Chapel of Grace</div>
        <h2>Workers' Portal</h2>
      </div>
    </div>
  </div>

  <div class="page-wrap">
    <p class="intro">Tap a department to see meeting times, what to expect, and how to join.</p>
    <div id="departmentsContainer"></div>
  </div>

  <!-- REGISTRATION MODAL BACKDROP -->
  <div class="reg-backdrop" id="regBackdrop" style="display:none">
    <div class="reg-modal">
      <div class="reg-modal-header">
        <div>
          <h3 id="regModalTitle">Register for Department</h3>
          <p id="regModalSub">Fill in your details and we'll be in touch.</p>
        </div>
        <button class="reg-close" id="regClose" aria-label="Close"><i class="bi bi-x-lg"></i></button>
      </div>

      <div class="reg-fields">
        <div class="reg-field reg-field-full">
          <label>Full Name</label>
          <input type="text" id="reg_name" placeholder="e.g. John Adeyemi">
        </div>
        <div class="reg-field">
          <label>Phone Number</label>
          <input type="tel" id="reg_phone" placeholder="e.g. 08012345678">
        </div>
        <div class="reg-field">
          <label>Email Address</label>
          <input type="email" id="reg_email" placeholder="you@example.com">
        </div>
        <div class="reg-field reg-field-full">
          <label>Department</label>
          <input type="text" id="reg_dept" readonly style="background:#f4f6fb;cursor:default">
        </div>
        <div class="reg-field reg-field-full">
          <label>Why do you want to join this department?</label>
          <textarea id="reg_reason" rows="3" placeholder="Tell us a little about yourself and your motivation…"></textarea>
        </div>
        <div class="reg-field reg-field-full">
          <label>Any relevant skills or experience?</label>
          <textarea id="reg_skills" rows="2" placeholder="Optional — e.g. singing, sound engineering, nursing…"></textarea>
        </div>
      </div>

      <div class="reg-success" id="regSuccess" style="display:none">
        <i class="bi bi-check-circle-fill"></i>
        <div>
          <strong>Application submitted!</strong>
          <p>The department leader will reach out to you soon. God bless you.</p>
        </div>
      </div>

      <div class="reg-actions" id="regActions">
        <button class="reg-cancel" id="regCancelBtn">Cancel</button>
        <button class="reg-submit" id="regSubmitBtn">
          <i class="bi bi-send-fill"></i> Submit Application
        </button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="shared.js"></script>
  <script src="workers.js"></script>
</body>
</html>
